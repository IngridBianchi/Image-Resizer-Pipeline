name: CI/CD Pipeline - Image Resizer

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: lambda/package-lock.json

      - name: Instalar dependencias
        run: npm ci
        working-directory: ./lambda

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: lambda/package-lock.json

      - name: Instalar dependencias
        run: npm ci
        working-directory: ./lambda

      - name: Ejecutar tests unitarios e integración
        run: npm run test:ci
        working-directory: ./lambda

  package:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Empaquetar Lambda en ZIP (Linux compatible)
        run: |
          docker run --rm -v "$PWD/lambda:/var/task" public.ecr.aws/sam/build-nodejs20.x:latest bash -lc "cd /var/task && rm -rf node_modules && npm ci --omit=dev --include=optional && mkdir -p dist && rm -f dist/lambda.zip && zip -r dist/lambda.zip handler.js services interfaces useCases package.json node_modules"

      - name: Publicar artefacto Lambda
        uses: actions/upload-artifact@v4
        with:
          name: lambda-zip
          path: lambda/dist/lambda.zip

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: package
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Descargar artefacto Lambda
        uses: actions/download-artifact@v4
        with:
          name: lambda-zip
          path: lambda/dist

      - name: Configurar AWS CLI
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Inicializar Terraform
        run: terraform init -backend-config=backend.hcl
        working-directory: ./infra

      - name: Validar Terraform
        run: terraform validate
        working-directory: ./infra

      - name: Aplicar Terraform (despliegue Lambda + S3)
        run: terraform apply -auto-approve
        working-directory: ./infra